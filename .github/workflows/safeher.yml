name: Flutter CI

# When this workflow should run
on:
  push:
    branches: [ main ]  # runs when code is pushed to main branch
  pull_request:
    branches: [ main ]  # runs on PRs to main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3  # gets your code

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.0'  # replace with your Flutter version

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test
